<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบเปิดบิลทอง — โรงหล่อสุนทร เจริญนคร</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* ── DARK THEME ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#121212;font-size:14px;color:#e0e0e0}
.app{max-width:860px;margin:0 auto;padding:1rem}
.topbar{background:#1a1a2e;border-radius:10px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:10px;border:1px solid #333}
.ticon{width:36px;height:36px;border-radius:50%;background:#FAC775;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ttitle{font-size:15px;font-weight:bold;color:#F0C040}
.tsub{font-size:11px;color:#aaa;margin-top:1px}
.billno{margin-left:auto;text-align:right;font-size:11px;color:#aaa;font-family:monospace}

.card{background:#1e1e1e;border:1px solid #333;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.sl{font-size:10px;font-weight:bold;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.fg{display:grid;gap:8px;margin-bottom:8px}
.f2{grid-template-columns:1fr 1fr}.f3{grid-template-columns:1fr 1fr 1fr}
.fi{display:flex;flex-direction:column;gap:3px}
.fi label{font-size:11px;color:#999}
.fi input,.fi select, textarea{height:33px;padding:0 8px;border:1px solid #444;border-radius:7px;font-size:13px;width:100%;background:#2c2c2c;color:#fff}
.fi input:focus,.fi select:focus, textarea:focus{outline:none;border-color:#BA7517}
.fi input.locked{background:#222;color:#777;cursor:default;border-color:#333}

.cust-wrap{position:relative}
.cust-wrap input{width:100%}
.cust-dropdown{display:none;position:absolute;top:100%;left:0;right:0;background:#2c2c2c;border:1px solid #444;border-radius:0 0 7px 7px;max-height:180px;overflow-y:auto;z-index:50;box-shadow:0 4px 10px rgba(0,0,0,.5)}
.cust-dropdown.show{display:block}
.cust-item{padding:8px 10px;font-size:13px;cursor:pointer;border-bottom:1px solid #333}
.cust-item:hover{background:#3a3a3a}
.cust-item.new{color:#FAC775;font-style:italic}

.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.pill{background:#332810;border:1px solid #FAC775;border-radius:5px;padding:2px 8px;font-size:11px;color:#FAC775}
.pill b{color:#fff}

table{width:100%;border-collapse:collapse}
thead th{font-size:10px;color:#aaa;font-weight:normal;padding:4px 5px;border-bottom:1px solid #444;text-align:left;white-space:nowrap}
thead th:not(:first-child){text-align:right}
tbody td{padding:3px 3px;border-bottom:1px solid #333;vertical-align:middle}
tbody td input,tbody td select{height:29px;padding:0 5px;border:1px solid #444;border-radius:5px;font-size:12px;width:100%;background:#2c2c2c;color:#fff}
tbody td input:focus{outline:none;border-color:#BA7517}
.rc{background:#222!important;border:1px solid #333!important;color:#aaa;text-align:right;font-size:12px;cursor:default}

.badd{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#ccc;background:none;border:1px solid #555;border-radius:6px;padding:4px 9px;cursor:pointer;margin-top:5px}
.badd:hover{background:#333}
.del{width:24px;height:24px;border-radius:50%;background:none;border:1px solid #555;color:#888;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center}
.del:hover{background:#522;border-color:#a44;color:#f66}

.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.kpi{background:#2a2a2a;padding:8px;text-align:center;border-radius:8px;}
.kl{font-size:10px;color:#aaa;margin-bottom:2px}.kv{font-size:19px;font-weight:bold;color:#fff}.ku{font-size:10px;color:#888}

.totbar{background:#332810;border:1px solid #FAC775;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.totlbl{font-size:13px;font-weight:bold;color:#FAC775}.totval{font-size:24px;font-weight:bold;color:#fff}

.acts{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:5px}
.btn{flex:1;min-width:100px;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;border:1px solid;display:flex;align-items:center;justify-content:center;gap:4px}
.bg{background:#BA7517;border-color:#854F0B;color:#fff}.bg:hover{background:#9a6010}
.bo{background:#2c2c2c;border-color:#555;color:#e0e0e0}.bo:hover{background:#3a3a3a}

.stbar{font-size:12px;text-align:center;min-height:16px;color:#888}
.ok{color:#4caf50}.er{color:#f44336}

/* ── PRINT (สว่างเหมือนเดิม) ── */
#billPrintArea{display:none}
@media print{
  body{background:#fff!important;color:#000!important}
  body>*{display:none!important}
  #billPrintArea{display:block!important;background:#fff;color:#000}
  @page{size:80mm auto;margin:0}
}
#billPrintArea{font-family:Arial,sans-serif;font-size:12px;width:72mm;margin:0 auto;padding:3mm 2mm}
.bh{text-align:center;border-bottom:2.5px solid #000;padding-bottom:5px;margin-bottom:5px}
.bh .sn{font-size:15px;font-weight:bold;letter-spacing:1px}
.bh .sc{font-size:9px;color:#333;margin-top:3px;line-height:1.7}
.bm{font-size:10px;border-bottom:1px dashed #999;padding-bottom:5px;margin-bottom:4px}
.bm table{width:100%;border-collapse:collapse}
.bm td{padding:1px 0;font-size:10px;border:none;color:#000}
.bm td.r{text-align:right}
.st{font-size:9px;font-weight:bold;text-transform:uppercase;letter-spacing:.05em;background:#eee;padding:2px 4px;border-top:1.5px solid #000;border-bottom:1px solid #bbb;margin:5px 0 0;color:#000}
.git{width:100%;border-collapse:collapse;table-layout:fixed}
.git th{font-size:8px;color:#000;font-weight:bold;padding:3px 2px;border:1px solid #bbb;text-align:center;background:#f2f2f2}
.git td{font-size:10px;padding:4px 2px;border:1px solid #ddd;text-align:center;color:#000}
.git td:first-child{font-weight:bold}
.git td.ppg,.git td.amt{text-align:right}
.git td.amt{font-weight:bold}
.glt{width:100%;border-collapse:collapse}
.glt th{font-size:8px;font-weight:bold;padding:3px;border:1px solid #bbb;text-align:center;background:#f2f2f2;color:#000}
.glt td{font-size:10px;padding:4px 3px;border:1px solid #ddd;text-align:center;color:#000}
.glt td:last-child{text-align:right;font-weight:bold}
.tots{padding:5px 2px;border-top:1px dashed #999;margin-top:5px}
.tl{display:flex;justify-content:space-between;font-size:10px;padding:1px 0;color:#333}
.tl.g{font-size:15px;font-weight:bold;padding-top:5px;border-top:2.5px solid #000;margin-top:4px;color:#000}
.bf{text-align:center;border-top:2px solid #000;padding-top:5px;margin-top:5px}
.bf .thx{font-size:11px;font-weight:bold;color:#000}
.bf .nt{font-size:9px;color:#666;margin-top:2px}
@media(max-width:560px){.f2,.f3{grid-template-columns:1fr 1fr}.kpis{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
 
<div class="topbar">
  <div class="ticon">&#x1F947;</div>
  <div>
    <div class="ttitle">โรงหล่อสุนทร เจริญนคร</div>
    <div class="tsub">ระบบเปิดบิลทอง — สูตรจริงของโรงหล่อ (Dark Mode)</div>
  </div>
  <div class="billno"><div id="billno"></div><div id="todayTxt" style="font-size:10px"></div></div>
</div>
 
<div class="card">
  <div class="sl">ข้อมูลลูกค้า</div>
  <div class="fg f3">
    <div class="fi" style="grid-column:span 2">
      <label>ชื่อลูกค้า / ร้าน <span style="color:#BA7517;font-size:10px">(พิมพ์แล้วระบบจำให้อัตโนมัติ)</span></label>
      <div class="cust-wrap">
        <input type="text" id="customer" placeholder="พิมพ์หรือเลือกชื่อลูกค้า" autocomplete="off"
          oninput="onCustInput()" onfocus="onCustFocus()" onblur="setTimeout(hideCustDD,200)">
        <div class="cust-dropdown" id="custDD"></div>
      </div>
    </div>
    <div class="fi">
      <label>วันที่รับงาน</label>
      <input type="text" id="orderDate" class="locked" readonly>
      <input type="hidden" id="orderDateISO">
    </div>
  </div>
  <div class="fg f2">
    <div class="fi">
      <label>ราคาทอง (บาท/บาทหนัก)</label>
      <input type="number" id="goldPrice" placeholder="เช่น 72,100" oninput="onGC()">
    </div>
    <div class="fi">
      <label>ราคาพาราเดียม (บาท/บาทหนัก)</label>
      <input type="number" id="pallaPrice" placeholder="เช่น 34,100" oninput="onGC()">
    </div>
  </div>
  <div class="pills" id="pills"></div>
</div>
 
<div class="card">
  <div class="sl">รายการทอง</div>
  <div style="overflow-x:auto"><table>
    <thead><tr>
      <th style="width:115px">ประเภท</th>
      <th style="width:90px">น้ำหนัก (g)</th>
      <th style="width:70px">ซิ (%)</th>
      <th style="width:85px">สุทธิ (g)</th>
      <th style="width:95px">ราคากรัมละ</th>
      <th style="width:95px">ยอดเงิน</th>
      <th style="width:28px"></th>
    </tr></thead>
    <tbody id="goldBody"></tbody>
  </table></div>
  <button class="badd" onclick="addG()">+ เพิ่มรายการทอง</button>
</div>
 
<div class="card">
  <div class="sl">ค่าแรง / อื่นๆ</div>
  <div style="overflow-x:auto"><table>
    <thead><tr>
      <th style="width:200px">รายการ</th>
      <th style="width:75px">จำนวน</th>
      <th style="width:110px">ราคา/หน่วย (บาท)</th>
      <th style="width:95px">ยอดเงิน</th>
      <th style="width:28px"></th>
    </tr></thead>
    <tbody id="laborBody"></tbody>
  </table></div>
  <button class="badd" onclick="addL()">+ เพิ่มรายการ</button>
</div>
 
<div class="kpis">
  <div class="kpi"><div class="kl">น้ำหนักสุทธิรวม</div><div class="kv" id="kWt">0.00</div><div class="ku">กรัม</div></div>
  <div class="kpi"><div class="kl">มูลค่าทองรวม</div><div class="kv" id="kGold">0</div><div class="ku">บาท</div></div>
  <div class="kpi"><div class="kl">ค่าแรง/อื่นๆ</div><div class="kv" id="kLabor">0</div><div class="ku">บาท</div></div>
</div>
 
<div class="totbar">
  <div class="totlbl">รวมทั้งบิล</div>
  <div class="totval" id="grandTotal">0 บาท</div>
</div>
 
<div class="card">
  <div class="sl">หมายเหตุ</div>
  <textarea id="note" rows="2" style="width:100%;border:1px solid #444;border-radius:7px;padding:7px;font-size:13px;resize:vertical;font-family:Arial;background:#2c2c2c;color:#fff" placeholder="เช่น resin ยี่ห้อ, สีพิเศษ..."></textarea>
</div>
 
<div class="acts">
  <button class="btn bg" onclick="saveAndPrint()">&#x1F4BE; บันทึก + พิมพ์บิล</button>
  <button class="btn bo" onclick="clearAll()">&#x1F504; บิลใหม่</button>
</div>
<div class="stbar" id="stbar"></div>
</div>
 
<div id="billPrintArea"></div>
